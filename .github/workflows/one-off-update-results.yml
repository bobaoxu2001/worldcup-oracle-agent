name: One-off update latest World Cup results

on:
  push:
    paths:
      - ".github/workflows/one-off-update-results.yml"

permissions:
  contents: write

jobs:
  update-results:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Record settled knockout results
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          import textwrap

          path = Path("lib/seed/manual-match-results.ts")
          text = path.read_text()

          marker = 'sourceName: "Reuters (France 2-0 Morocco match report)"'
          if marker in text:
              print("Latest results are already present; leaving data entries unchanged.")
          else:
              header_pattern = re.compile(
                  r" \* Last updated: 2026-07-07.*?Switzerland-Colombia not kicked off at update time\) — never guessed\.\n",
                  re.S,
              )
              header_replacement = textwrap.dedent("""\
               * Last updated: 2026-07-10 — Round of 16 COMPLETE and the first
               * quarter-final recorded. Added USA 1-4 Belgium, Argentina 3-2 Egypt,
               * Switzerland 0-0 Colombia (Switzerland won the shootout 4-3), and
               * France 2-0 Morocco. Scores and advancement were cross-checked against
               * current tournament data plus AP/Reuters/Guardian match reporting.
               * ── Prior 2026-07-07 — Round of 32 COMPLETE + first five Round-of-16
               * results, all verified against the football-data.org official feed.
              """)
              text, n = header_pattern.subn(header_replacement, text, count=1)
              if n != 1:
                  raise SystemExit("Could not replace the stale 2026-07-07 header block")

              stale_note = textwrap.dedent("""\
                // NOTE: three round-of-16 ties are NOT yet recorded — USA v Belgium was still
                // IN_PLAY, and Argentina v Egypt and Switzerland v Colombia had not kicked off
                // at update time (7 July). They will be added once the feed settles them.
              """)
              if stale_note not in text:
                  raise SystemExit("Could not find the stale Round-of-16 note")

              additions = textwrap.dedent("""\
                // ── Remaining Round of 16 ties (6–7 July) and first quarter-final
                //    (9 July), verified on 10 July against current tournament results
                //    and independent match reports. Shootouts remain draws in the Elo
                //    fold; `advances` resolves bracket progression. ──
                {
                  group: "R16",
                  teamA: "usa",
                  teamB: "belgium",
                  scoreA: 1,
                  scoreB: 4,
                  date: "2026-07-06",
                  note: "Belgium eliminated co-hosts USA 4–1 in regulation and advanced to face Spain in the quarter-finals. The score is recorded as a decisive Belgium win in the Elo fold.",
                  sourceName: "The Guardian (USA 1-4 Belgium live report)",
                  sourceUrl: "https://www.theguardian.com/football/live/2026/jul/06/usa-v-belgium-world-cup-2026-last-16-live",
                  verified: true,
                  verifiedAt: "2026-07-10",
                },
                {
                  group: "R16",
                  teamA: "argentina",
                  teamB: "egypt",
                  scoreA: 3,
                  scoreB: 2,
                  date: "2026-07-07",
                  note: "Argentina recovered from 2–0 down late in the match to beat Egypt 3–2 in regulation and reach the quarter-finals. The full-time score is recorded as a decisive Argentina win in the Elo fold.",
                  sourceName: "Associated Press (Argentina 3-2 Egypt match report)",
                  sourceUrl: "https://apnews.com/article/5129f0693b78e1ca7efeee87c46cc4cb",
                  verified: true,
                  verifiedAt: "2026-07-10",
                },
                {
                  group: "R16",
                  teamA: "switzerland",
                  teamB: "colombia",
                  scoreA: 0,
                  scoreB: 0,
                  date: "2026-07-07",
                  advances: "switzerland",
                  note: "Switzerland beat Colombia 4–3 on penalties after a 0–0 draw to reach their first World Cup quarter-final since 1954. Recorded at 0–0 so the Elo fold treats the match as a draw; Switzerland's advancement is carried separately.",
                  sourceName: "Reuters (Colombia exit after Switzerland shootout win)",
                  sourceUrl: "https://www.reuters.com/sports/soccer/falcao-calls-colombian-football-a-disgrace-after-world-cup-exit-2026-07-08/",
                  verified: true,
                  verifiedAt: "2026-07-10",
                },
                {
                  group: "QF",
                  teamA: "france",
                  teamB: "morocco",
                  scoreA: 2,
                  scoreB: 0,
                  date: "2026-07-09",
                  note: "France beat Morocco 2–0 in regulation, recording a third consecutive knockout-stage clean sheet and becoming the first confirmed semi-finalist. The result is folded as a decisive France win.",
                  sourceName: "Reuters (France 2-0 Morocco match report)",
                  sourceUrl: "https://www.reuters.com/sports/soccer/mbappe-leads-france-comfortable-2-0-win-over-morocco-2026-07-09/",
                  verified: true,
                  verifiedAt: "2026-07-10",
                },
              """)
              text = text.replace(stale_note, additions, 1)
              path.write_text(text)
              print("Recorded four settled knockout results.")
          PY

      - name: Refit Dixon-Coles model and regenerate reports
        run: npm run dc:nightly

      - name: Validate model integration
        run: |
          npm run typecheck
          npm run test:completed
          npm run test:ratings
          npm run test:path
          npm run test:track

      - name: Remove one-off workflow and commit generated model update
        shell: bash
        run: |
          rm -f .github/workflows/one-off-update-results.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "data: complete R16 and add France-Morocco quarterfinal"
            git push origin HEAD:main
          fi
